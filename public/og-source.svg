        font-family: "Bricolage Grotesque";
        font-weight: 700;
        src: url("fonts/bricolage-700.woff2") format("woff2");
      }
      @font-face {
        font-family: "Bricolage Grotesque";
        font-weight: 600;
        src: url("fonts/bricolage-600.woff2") format("woff2");
      }
